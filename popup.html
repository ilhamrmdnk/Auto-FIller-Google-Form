<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Google Form AutoFill Pro</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h2>Form AutoFill</h2>
            <div class="header-meta">
                <p class="subtitle">Import & isi data gform instan</p>
                <span class="wm">by: remdeng</span>
            </div>
        </header>

        <main>
            <section class="input-section">
                <label for="responsesInput">Answer</label>
                <textarea
                    id="responsesInput"
                    placeholder="Paste your answer here&#10;Example:&#10;Name: Budi&#10;Age: 20"
                ></textarea>
                <button id="importBtn" class="btn btn-primary">
                    Import Responses
                </button>
            </section>

            <hr class="divider">

            <section class="viewer-section">
                <div class="viewer-header">
                    <span class="label">Preview Data</span>
                    <div id="counter">No Data</div>
                </div>
                
                <div id="answerView" class="empty-state">
                    Nothing.
                </div>
            </section>

            <div class="button-group grid-2">
                <button id="prevBtn" class="btn btn-secondary">◀ Prev</button>
                <button id="nextBtn" class="btn btn-secondary">Next ▶</button>
            </div>

            <div class="button-group grid-2">
                <button id="fillBtn" class="btn btn-success">Fill Form</button>
                <button id="deleteBtn" class="btn btn-danger">Delete Current</button>
            </div>
        </main>

        <footer>
            <div class="footer-buttons">
                <button id="clearBtn" class="btn btn-link-danger">Clear All Data</button>
                <button id="donateBtn" class="btn btn-donate">Donate :]</button>
            </div>
        </footer>
    </div>

    <script src="parser.js"></script>
    <script src="storage.js"></script>
    <script src="popup.js"></script>

</body>
</html>
